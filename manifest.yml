id: helloworld
distro: ubuntu
version: "1.0"
description: Mensagem simples ao iniciar o container

entrypoint: "/usr/local/bin/start.sh"

execute:
  - "apt update -qq && apt upgrade -y -qq"
  - "apt clean -qq"

  - "cat > /usr/local/bin/start.sh << 'EOL'\n#!/bin/bash\nclear\n\necho \"\"\necho \"🧸 Hello from UContainerD!\"\necho \"\"\necho \"   Made in Brazil ❤️\"\necho \"\"\nsleep 2\nexec bash\nEOL"

  - "chmod +x /usr/local/bin/start.sh"