id: helloworld
distro: ubuntu
version: "1.0"
description: Mensagem simples ao iniciar o container

entrypoint: "/usr/local/bin/start.sh"

execute:
  - "apt update -qq && apt upgrade -y -qq"
  - "apt clean -qq"

  - |
    cat > /usr/local/bin/start.sh << 'EOL'
#!/bin/bash
clear
echo ""
echo "🧸 Hello from UContainerD!"
echo ""
echo "   Made in Brazil ❤️"
echo ""
sleep 2
exec bash
EOL

  - "chmod +x /usr/local/bin/start.sh"